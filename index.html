<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyne Reprocess Tool | Simple Access</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #334155;
            --success: #10b981;
            --error: #f87171;
            --border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { margin: 0 0 10px 0; font-size: 1.5rem; font-weight: 700; text-align: center; }
        p.subtitle { color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--primary); }

        button {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 10px; font-weight: 600; cursor: pointer; 
            margin-top: 10px; font-size: 1rem;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #status-msg { display: none; margin-top: 20px; padding: 15px; border-radius: 10px; font-size: 0.9rem; text-align: center; font-weight: 500; }
        .success-box { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid var(--success); }
        .error-box { background: rgba(239, 68, 68, 0.15); color: var(--error); border: 1px solid var(--error); }

        .hidden { display: none !important; }

        .loading-overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); 
            display: none; justify-content: center; align-items: center; 
            z-index: 100;
        }
        .spinner { 
            width: 30px; height: 30px; border: 3px solid var(--input-bg); 
            border-top-color: var(--primary); border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div class="spinner"></div>
</div>

<!-- LOGIN VIEW -->
<div id="login-section" class="container">
    <h2>Spyne Login</h2>
    <p class="subtitle">Enter credentials to continue</p>
    
    <div class="form-group">
        <label>User Email</label>
        <select id="login_email">
            <option value="admin@spyne.ai">Admin</option>
            <option value="sarika.rawat@spyne.co.in">Sarika Rawat</option>
            <option value="bhanu.solanki@spyne.co.in">Bhanu Solanki</option>
            <option value="lavi.vashisth@spyne.co.in">Lavi Vashisth</option>
            <option value="girish.chandra@spyne.co.in">Girish Chandra</option>
            <option value="drishti.taliyan@spyne.co.in">Drishti Taliyan</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Access Password</label>
        <input type="password" id="login_password" placeholder="Enter password" onkeydown="if(event.key === 'Enter') handleLogin()">
    </div>
    
    <button onclick="handleLogin()">Sign In</button>
    <div id="login-error" class="error-box" style="display:none; margin-top:15px; padding:12px; font-size:0.8rem;"></div>
</div>

<!-- TOOL VIEW -->
<div id="tool-section" class="container hidden">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px;">
        <div style="text-align: left;">
            <h2 style="text-align: left; font-size: 1.25rem;">Reprocess Tool</h2>
            <span id="active-user" style="font-size: 0.75rem; color: var(--text-muted);"></span>
        </div>
        <button onclick="location.reload()" style="width:auto; padding: 6px 12px; font-size: 0.75rem; background: #475569; margin: 0;">Logout</button>
    </div>
    
    <div class="form-group">
        <label>SKU ID</label>
        <input type="text" id="sku_id" placeholder="Ex: SKU-12345">
    </div>
    
    <div class="form-group">
        <label>Background ID</label>
        <input type="text" id="bgId" placeholder="Optional Background ID">
    </div>
    
    <div class="form-group">
        <label>Content Type</label>
        <select id="type">
            <option value="1">Image</option>
            <option value="0">Video</option>
        </select>
    </div>
    
    <button id="submitBtn" onclick="callAPI()">Reprocess Now</button>
    <div id="status-msg"></div>
</div>

<script>
    // HARDCODED LOCAL PASSWORDS UPDATED
    const USER_VAULT = {
        "admin@spyne.ai": "admin@123",
        "sarika.rawat@spyne.co.in": "sarika@2003",
        "bhanu.solanki@spyne.co.in": "bhanu123",
        "lavi.vashisth@spyne.co.in": "LAVI@#0000",
        "girish.chandra@spyne.co.in": "girish123",
        "drishti.taliyan@spyne.co.in": "drishti123"
    };
    
    let loggedInUser = null;

    function handleLogin() {
        const email = document.getElementById("login_email").value;
        const pass = document.getElementById("login_password").value;
        const errorEl = document.getElementById("login-error");

        if (USER_VAULT[email] && pass === USER_VAULT[email]) {
            loggedInUser = email;
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("tool-section").classList.remove("hidden");
            document.getElementById("active-user").innerText = email;
        } else {
            errorEl.innerText = "Invalid password. Access denied.";
            errorEl.style.display = "block";
        }
    }

    async function submitToGoogleForm(sku, bgId, email) {
        // Google Form details based on pre-fill link provided
        const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSf6Tx5CKFLcG-R8djq24_bUetCT780hUUd34XIWZCZeS-0Dbg/formResponse";
        
        const formData = new URLSearchParams();
        formData.append("entry.2033020472", sku);        // SKU ID
        formData.append("entry.189620745", bgId || "");  // Background ID
        formData.append("entry.213406280", email);       // Email

        try {
            // mode: 'no-cors' is necessary because Google Forms does not return CORS headers
            await fetch(formUrl, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            });
            console.log("Form data sent to Google Sheets");
        } catch (e) {
            console.error("Form submission failed", e);
        }
    }

    async function callAPI() {
        const skuInput = document.getElementById("sku_id");
        const bgInput = document.getElementById("bgId");
        const sku = skuInput.value;
        const bgId = bgInput.value;
        const btn = document.getElementById("submitBtn");
        const loader = document.getElementById("loading");

        if (!sku) { showMessage("SKU ID required", "error"); return; }
        
        btn.disabled = true;
        loader.style.display = "flex";

        try {
            const response = await fetch("https://api.spyne.ai/360/v1/reprocess", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    sku_id: sku,
                    bgId: bgId || null,
                    user_email_id: loggedInUser,
                    stablize: document.getElementById("type").value,
                    reason: "Web Reprocess Tool",
                    prev_status: "done"
                })
            });
            
            if (response.ok) {
                // Submit to Google Form on success
                await submitToGoogleForm(sku, bgId, loggedInUser);
                
                showMessage("Reprocess request successful.", "success");
                
                // Clear fields after success
                skuInput.value = "";
                bgInput.value = "";
            } else {
                const data = await response.json();
                throw new Error(data.message || "Reprocess failed");
            }
        } catch (e) {
            showMessage(e.message, "error");
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }

    function showMessage(msg, type) {
        const el = document.getElementById("status-msg");
        el.innerText = msg;
        el.className = type === "success" ? "success-box" : "error-box";
        el.style.display = "block";
    }
</script>
</body>
</html>
