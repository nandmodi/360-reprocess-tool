<!DOCTYPE html>
<html>
<head>
  <title>Spyne Reprocess Tool</title>
  <style>
    body { font-family: Arial; padding: 30px; max-width: 500px; margin: auto; }
    input, select { width: 100%; padding: 8px; margin-bottom: 10px; }
    button { padding: 10px; width: 100%; background: #007bff; color: white; border: none; }
    pre { background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>

<h2>Spyne Reprocess Tool</h2>

<label>SKU ID</label>
<input type="text" id="sku_id">

<label>Background ID</label>
<input type="text" id="bgId">

<label>User Email</label>
<input type="text" id="user_email_id">

<label>Type</label>
<select id="type">
  <option value="1">Image</option>
  <option value="0">Video</option>
</select>

<button onclick="callAPI()">Reprocess</button>

<h3>Response:</h3>
<pre id="result"></pre>

<script>
async function callAPI() {
  const sku_id = document.getElementById("sku_id").value;
  const bgId = document.getElementById("bgId").value;
  const user_email_id = document.getElementById("user_email_id").value;
  const stablize = document.getElementById("type").value;

  const payload = {
    stablize: stablize,
    colmap: "vanilla",
    studio_classifier: "0",
    reason: "Reprocess",
    prev_status: "done",
    process_exposure: "forced_no",
    process_mvg: "forced_no",
    sku_id: sku_id,
    bgId: bgId,
    user_email_id: user_email_id
  };

  try {
    const response = await fetch("https://api.spyne.ai/360/v1/reprocess", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
        // Add Authorization here if needed
      },
      body: JSON.stringify(payload)
    });

    const data = await response.json();
    document.getElementById("result").innerText = JSON.stringify(data, null, 2);

  } catch (error) {
    document.getElementById("result").innerText = "Error: " + error;
  }
}
</script>

</body>
</html>
