<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyne Reprocess Tool | Secure Access</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #334155;
            --success: #10b981;
            --error: #f87171;
            --border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { margin: 0 0 10px 0; font-size: 1.5rem; font-weight: 700; text-align: center; }
        p.subtitle { color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--primary); }

        button {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 10px; font-weight: 600; cursor: pointer; 
            margin-top: 10px; font-size: 1rem;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #status-msg { display: none; margin-top: 20px; padding: 15px; border-radius: 10px; font-size: 0.9rem; text-align: center; font-weight: 500; }
        .success-box { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid var(--success); }
        .error-box { background: rgba(239, 68, 68, 0.15); color: var(--error); border: 1px solid var(--error); }

        .hidden { display: none !important; }

        .loading-overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); 
            display: none; justify-content: center; align-items: center; 
            z-index: 100; flex-direction: column; gap: 20px;
        }
        .spinner { 
            width: 40px; height: 40px; border: 4px solid var(--input-bg); 
            border-top-color: var(--primary); border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .admin-helper { margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); }
        .admin-helper h4 { font-size: 0.7rem; color: var(--text-muted); margin: 0 0 10px 0; text-transform: uppercase; }
        .hash-result { 
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.7rem; background: #000; padding: 10px; border-radius: 6px; 
            word-break: break-all; color: #fbbf24; border: 1px solid #444; margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <span style="font-weight: 500; letter-spacing: 1px; color: white;">SYNCING SECURE VAULT...</span>
</div>

<!-- LOGIN VIEW -->
<div id="login-section" class="container">
    <h2>Spyne Login</h2>
    <p class="subtitle">Secure access to Reprocess Utility</p>
    
    <div class="form-group">
        <label>Select User</label>
        <select id="login_email">
            <option value="" disabled selected>Choose Account</option>
            <option value="admin@spyne.ai">Admin</option>
            <option value="sarika.rawat@spyne.co.in">Sarika Rawat</option>
            <option value="bhanu.solanki@spyne.co.in">Bhanu Solanki</option>
            <option value="lavi.vashisth@spyne.co.in">Lavi Vashisth</option>
            <option value="girish.chandra@spyne.co.in">Girish Chandra</option>
            <option value="drishti.taliyan@spyne.co.in">Drishti Taliyan</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="login_password" placeholder="••••••••">
    </div>
    
    <button onclick="handleLogin()">Sign In</button>
    <div id="login-error" class="error-box" style="display:none; margin-top:15px; padding:12px; font-size:0.8rem;"></div>

    <div class="admin-helper">
        <h4>Hash Utility (Update Gist)</h4>
        <input type="text" placeholder="Generate hash for new password" oninput="generateHash(this.value)" style="font-size: 0.8rem; padding: 8px;">
        <div id="hash_output" class="hash-result hidden"></div>
    </div>
</div>

<!-- TOOL VIEW -->
<div id="tool-section" class="container hidden">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px;">
        <div style="text-align: left;">
            <h2 style="text-align: left; font-size: 1.25rem;">Reprocess Tool</h2>
            <span id="active-user" style="font-size: 0.75rem; color: var(--text-muted);"></span>
        </div>
        <button onclick="location.reload()" style="width:auto; padding: 6px 12px; font-size: 0.75rem; background: #475569; margin: 0;">Logout</button>
    </div>
    
    <div class="form-group">
        <label>SKU ID</label>
        <input type="text" id="sku_id" placeholder="Ex: SKU-12345">
    </div>
    
    <div class="form-group">
        <label>Background ID</label>
        <input type="text" id="bgId" placeholder="Optional Background ID">
    </div>
    
    <div class="form-group">
        <label>Content Type</label>
        <select id="type">
            <option value="1">Image</option>
            <option value="0">Video</option>
        </select>
    </div>
    
    <button id="submitBtn" onclick="callAPI()">Reprocess Now</button>
    <div id="status-msg"></div>
</div>

<script>
    /**
     * CONFIGURATION (Connected to your GitHub Token and Gist ID)
     */
    const VAULT_CONFIG = {
        githubToken: "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", 
        gistId: "f7abacdffaa99e8e0f44d8127af31acb",
        fileName: "vault.json"
    };

    let vaultData = null;
    let loggedInUser = null;

    // Generate SHA-256 hash
    async function sha256(str) {
        const buf = new TextEncoder().encode(str);
        const hash = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Helper for generating hashes for vault.json updates
    async function generateHash(val) {
        const out = document.getElementById("hash_output");
        if (!val) { out.classList.add("hidden"); return; }
        out.innerText = await sha256(val);
        out.classList.remove("hidden");
    }

    // Fetch the private Gist containing the password hashes
    async function fetchVault() {
        try {
            const response = await fetch(`https://api.github.com/gists/${VAULT_CONFIG.gistId}`, {
                headers: { 'Authorization': `token ${VAULT_CONFIG.githubToken}` }
            });
            if (!response.ok) throw new Error("Vault Connection Error");
            const data = await response.json();
            return JSON.parse(data.files[VAULT_CONFIG.fileName].content);
        } catch (e) {
            console.error(e);
            return null;
        }
    }

    // Handle Login authentication
    async function handleLogin() {
        const email = document.getElementById("login_email").value;
        const pass = document.getElementById("login_password").value;
        const errorEl = document.getElementById("login-error");
        const loader = document.getElementById("loading");

        if (!email || !pass) {
            errorEl.innerText = "Please select an account and enter password.";
            errorEl.style.display = "block";
            return;
        }

        loader.style.display = "flex";
        if (!vaultData) vaultData = await fetchVault();
        const hashedInput = await sha256(pass);
        loader.style.display = "none";

        if (vaultData && vaultData[email] === hashedInput) {
            loggedInUser = email;
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("tool-section").classList.remove("hidden");
            document.getElementById("active-user").innerText = email;
        } else {
            errorEl.innerText = vaultData ? "Incorrect password." : "Vault access error. Please check configuration.";
            errorEl.style.display = "block";
        }
    }

    // Call the Spyne Reprocess API
    async function callAPI() {
        const sku = document.getElementById("sku_id").value;
        const btn = document.getElementById("submitBtn");
        
        if (!sku) { showMessage("SKU ID is mandatory", "error"); return; }
        
        btn.disabled = true;
        btn.innerText = "Requesting API...";

        try {
            const response = await fetch("https://api.spyne.ai/360/v1/reprocess", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    sku_id: sku,
                    bgId: document.getElementById("bgId").value || null,
                    user_email_id: loggedInUser,
                    stablize: document.getElementById("type").value,
                    reason: "Web Reprocess Tool",
                    prev_status: "done"
                })
            });
            
            const data = await response.json();
            if (response.ok) {
                showMessage("Success! Reprocess request initiated.", "success");
            } else {
                throw new Error(data.message || "Request failed");
            }
        } catch (e) {
            showMessage("Error: " + e.message, "error");
        } finally {
            btn.disabled = false;
            btn.innerText = "Reprocess Now";
        }
    }

    function showMessage(msg, type) {
        const el = document.getElementById("status-msg");
        el.innerText = msg;
        el.className = type === "success" ? "success-box" : "error-box";
        el.style.display = "block";
    }
</script>
</body>
</html>
