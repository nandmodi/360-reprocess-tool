<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyne Reprocess Tool</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #1a2230;
            --card-bg: #242f41;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #334155;
            --border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        h2 { margin: 0; font-size: 1.5rem; font-weight: 700; }
        
        .user-badge {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 24px;
            display: block;
        }

        .logout-btn {
            background: #475569;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.025em; 
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input::placeholder { color: #64748b; }
        input:focus, select:focus { border-color: var(--primary); }

        .submit-btn {
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white;
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 1rem;
            margin-top: 10px;
        }

        .submit-btn:hover { background: var(--primary-hover); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #status-msg { 
            display: none; 
            margin-top: 20px; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 0.9rem; 
            text-align: center; 
        }
        .success-box { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; }
        .error-box { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid #f87171; }

        .hidden { display: none !important; }

        .loading-overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); 
            display: none; justify-content: center; align-items: center; 
            z-index: 100;
        }
        .spinner { 
            width: 32px; height: 32px; border: 3px solid #334155; 
            border-top-color: var(--primary); border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div class="spinner"></div>
</div>

<!-- LOGIN VIEW -->
<div id="login-section" class="container">
    <h2 style="text-align: center; margin-bottom: 8px;">Spyne Login</h2>
    <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px;">Enter credentials to continue</p>
    
    <div class="form-group">
        <label>User Email</label>
        <select id="login_email">
            <option value="admin@spyne.ai">Admin</option>
            <option value="sarika.rawat@spyne.co.in">Sarika Rawat</option>
            <option value="bhanu.solanki@spyne.co.in">Bhanu Solanki</option>
            <option value="lavi.vashisth@spyne.co.in">Lavi Vashisth</option>
            <option value="girish.chandra@spyne.co.in">Girish Chandra</option>
            <option value="drishti.taliyan@spyne.co.in">Drishti Taliyan</option>
            <option value="kishor@spyne.ai">Kishor</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Access Password</label>
        <input type="password" id="login_password" placeholder="Enter password" onkeydown="if(event.key === 'Enter') handleLogin()">
    </div>
    
    <button class="submit-btn" onclick="handleLogin()">Sign In</button>
    <div id="login-error" class="error-box" style="display:none; margin-top:15px;"></div>
</div>

<!-- TOOL VIEW -->
<div id="tool-section" class="container hidden">
    <div class="header-row">
        <h2>Reprocess Tool</h2>
        <button class="logout-btn" onclick="location.reload()">Logout</button>
    </div>
    <span id="active-user" class="user-badge"></span>
    
    <div class="form-group">
        <label>SKU ID</label>
        <input type="text" id="sku_id" placeholder="Ex: SKU-12345">
    </div>
    
    <div class="form-group">
        <label>BACKGROUND ID</label>
        <input type="text" id="bgId" placeholder="Optional Background ID">
    </div>

    <div class="form-group">
        <label>CONTENT TYPE</label>
        <select id="content_type">
            <option value="1">Image</option>
            <option value="0">Video</option>
        </select>
    </div>
    
    <button id="submitBtn" class="submit-btn" onclick="callAPI()">Reprocess Now</button>
    <div id="status-msg"></div>
</div>

<script>
    const USER_VAULT = {
        "admin@spyne.ai": "admin@123",
        "sarika.rawat@spyne.co.in": "sarika@2003",
        "bhanu.solanki@spyne.co.in": "bhanu123",
        "lavi.vashisth@spyne.co.in": "LAVI@#0000",
        "girish.chandra@spyne.co.in": "girish123",
        "drishti.taliyan@spyne.co.in": "drishti123",
        "kishor@spyne.ai": "kishor123"
    };
    
    let loggedInUser = null;

    function handleLogin() {
        const email = document.getElementById("login_email").value;
        const pass = document.getElementById("login_password").value;
        const errorEl = document.getElementById("login-error");

        if (USER_VAULT[email] && pass === USER_VAULT[email]) {
            loggedInUser = email;
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("tool-section").classList.remove("hidden");
            document.getElementById("active-user").innerText = email;
        } else {
            errorEl.innerText = "Invalid password. Access denied.";
            errorEl.style.display = "block";
        }
    }

    async function submitToGoogleForm(sku, bgId, email) {
        const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSf6Tx5CKFLcG-R8djq24_bUetCT780hUUd34XIWZCZeS-0Dbg/formResponse";
        const formData = new URLSearchParams();
        formData.append("entry.2033020472", sku);
        formData.append("entry.189620745", bgId || "");
        formData.append("entry.213406280", email);

        try {
            await fetch(formUrl, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            });
        } catch (e) { console.error("Sheet sync failed", e); }
    }

    async function callAPI() {
        const skuInput = document.getElementById("sku_id");
        const bgInput = document.getElementById("bgId");
        const sku = skuInput.value.trim();
        const bgId = bgInput.value.trim();
        const btn = document.getElementById("submitBtn");
        const loader = document.getElementById("loading");

        if (!sku) { showMessage("SKU ID is required", "error"); return; }
        
        btn.disabled = true;
        loader.style.display = "flex";

        // Hardcoded values from the JSON provided, with dynamic inputs mixed in
        const payload = {
            "stablize": document.getElementById("content_type").value, // Matches Image/Video
            "colmap": "vanilla",
            "studio_classifier": "0",
            "reason": "Reprocess",
            "prev_status": "done",
            "process_exposure": "forced_no",
            "process_mvg": "forced_no",
            "sku_id": sku,
            "bgId": bgId || null,
            "user_email_id": loggedInUser
        };

        try {
            const response = await fetch("https://api.spyne.ai/360/v1/reprocess", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            if (response.ok) {
                await submitToGoogleForm(sku, bgId, loggedInUser);
                showMessage("Success! SKU is being reprocessed.", "success");
                skuInput.value = "";
                bgInput.value = "";
            } else {
                const data = await response.json();
                throw new Error(data.message || "Failed to process SKU.");
            }
        } catch (e) {
            showMessage(e.message, "error");
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }

    function showMessage(msg, type) {
        const el = document.getElementById("status-msg");
        el.innerText = msg;
        el.className = type === "success" ? "success-box" : "error-box";
        el.style.display = "block";
    }
</script>
</body>
</html>
